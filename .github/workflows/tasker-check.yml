name: Tasker Case Check

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes, all day
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tasker-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python tasker_tracker.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit updated state and report if changed
        run: |
          git config user.name "Tasker Tracker Bot"
          git config user.email "tasker-tracker@users.noreply.github.com"
          git add tasker_seen_cases.json tasker_latest_cases.json tasker_latest_cases.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update tasker case tracker state $(date -u +"%Y-%m-%d %H:%M")"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
